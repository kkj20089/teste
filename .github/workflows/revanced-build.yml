name: Build ReVanced YouTube

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create keystore if missing
        run: python scripts/create_keystore.py

      - name: Build patched APK
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_revanced.py

      - name: Publish release
        if: ${{ steps.build.outputs.built == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.build_tag }}
          name: ReVanced YouTube ${{ steps.build.outputs.build_tag }}
          files: |
            dist/youtube-revanced.apk
            dist/update.json
          fail_on_unmatched_files: true

      - name: Send Telegram update
        if: ${{ steps.build.outputs.built == 'true' }}
        run: python scripts/notify_telegram.py

  deploy_worker:
    runs-on: ubuntu-latest
    needs: build_release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Load Cloudflare credentials
        id: cf
        run: |
          python - <<'PY'
          from pathlib import Path
          import scripts.config as config
          output = Path(__import__("os").environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"api_token={config.CLOUDFLARE_API_TOKEN}\n")
              handle.write(f"account_id={config.CLOUDFLARE_ACCOUNT_ID}\n")
              handle.write(f"worker_name={config.WORKER_NAME}\n")
          PY

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.cf.outputs.api_token }}
          accountId: ${{ steps.cf.outputs.account_id }}
          workingDirectory: worker
          command: deploy --name ${{ steps.cf.outputs.worker_name }}
